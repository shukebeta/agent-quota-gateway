<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Quota Gateway — Pool Management</title>
<style>
  /* Self-contained stylesheet — no external fonts, no CDN. */
  :root {
    --bg: #f7f7f8;
    --panel: #ffffff;
    --border: #d6d8db;
    --text: #1f2328;
    --muted: #57606a;
    --accent: #0969da;
    --accent-text: #ffffff;
    --danger: #cf222e;
    --ok: #1a7f37;
    --warn: #9a6700;
    --shadow: 0 1px 2px rgba(31, 35, 40, 0.04), 0 3px 6px rgba(31, 35, 40, 0.06);
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2f81f7;
      --accent-text: #ffffff;
      --danger: #f85149;
      --ok: #3fb950;
      --warn: #d29922;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 3px 6px rgba(0, 0, 0, 0.4);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
  }
  a { color: var(--accent); text-decoration: none; }
  a:focus, button:focus, .toggle:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

  header.top {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header.top h1 { font-size: 18px; margin: 0; }
  header.top .meta { color: var(--muted); font-family: var(--mono); font-size: 12px; }

  main { padding: 16px 24px 32px; max-width: 1200px; margin: 0 auto; }

  #banner {
    display: none;
    padding: 8px 12px;
    margin-bottom: 12px;
    border-radius: 6px;
    background: rgba(207, 34, 46, 0.1);
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  #banner.show { display: block; }

  .pool {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .pool header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .pool h2 { margin: 0; font-size: 15px; font-family: var(--mono); }
  .pool .badge { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .pool .updated { margin-left: auto; font-size: 12px; color: var(--muted); font-family: var(--mono); }

  .columns {
    display: grid;
    grid-template-columns: minmax(160px, 280px) minmax(0, 1fr);
    gap: 0;
  }
  /* Stack the two cards once the viewport can no longer fit the priority
     column beside the wide 7-column members table side-by-side (priority
     ~280px + table min-content ~727px + chrome). Below this the table takes
     the full card width instead of being squeezed into a scrolling cell. */
  @media (max-width: 1080px) {
    .columns { grid-template-columns: 1fr; }
  }
  .col {
    padding: 12px 16px;
    /* Allow the grid item to be narrower than its (wide) content so the
       members table's .members-scroll wrapper can actually scroll instead of
       forcing the cell past the card edge (clipped by .pool overflow:hidden). */
    min-width: 0;
  }
  .col + .col { border-left: 1px solid var(--border); }
  @media (max-width: 1080px) {
    .col + .col { border-left: none; border-top: 1px solid var(--border); }
  }
  .col h3 {
    margin: 0 0 8px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
  }

  ol.priority {
    list-style: none;
    padding: 0;
    margin: 0;
    counter-reset: prio;
  }
  ol.priority li {
    counter-increment: prio;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    margin-bottom: 6px;
    font-family: var(--mono);
  }
  ol.priority li::before {
    content: counter(prio);
    color: var(--muted);
    width: 1.5em;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  ol.priority li .nick { flex: 1; }
  ol.priority li button {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: var(--mono);
    cursor: pointer;
  }
  ol.priority li button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  ol.priority li button:disabled { opacity: 0.4; cursor: not-allowed; }
  .balanced-note { color: var(--muted); font-style: italic; }

  /* The members table is intrinsically wide (7 columns, with nowrap reset
     cells). It fits at desktop widths, but once the cards stack and the
     viewport is narrower than the table's min-content width (~727px, i.e.
     small tablets and phones) the cell can no longer hold it. This wrapper
     lets the table scroll horizontally inside its card instead of clipping
     the rightmost (actions) column. */
  .members-scroll { overflow-x: auto; }
  table.members {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.members th, table.members td {
    text-align: left;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  table.members th { font-weight: 600; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  table.members tr:last-child td { border-bottom: none; }
  table.members td.nick { font-family: var(--mono); }
  table.members td.quota { min-width: 72px; }
  table.members td.reset { color: var(--muted); white-space: nowrap; }

  /* Compact quota bar: a track with a fill, plus a NN% label. Falls back
     to a plain "-" text node when the window has no utilization yet.
     Reset times render in their own adjacent columns. */
  .quota-dash { color: var(--muted); }
  .quota-bar {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .quota-track {
    position: relative;
    flex: 1 1 auto;
    min-width: 36px;
    height: 8px;
    border-radius: 999px;
    background: var(--border);
    overflow: hidden;
  }
  .quota-fill {
    position: absolute;
    inset: 0 auto 0 0;
    height: 100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .quota-pct {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .status {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    text-transform: lowercase;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--bg);
  }
  .status[data-status="active"] { color: var(--ok); border-color: var(--ok); }
  .status[data-status="exhausted"] { color: var(--danger); border-color: var(--danger); }
  .status[data-status="disabled"] { color: var(--muted); }
  .status[data-status="idle"] { color: var(--accent); border-color: var(--accent); }

  /* Per-member enable/disable control. Encodes the member's *current* state,
     not the action the click will perform. The click still routes through
     toggleMember() at index.html:866 and the /enable / /disable endpoints. */
  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 0;
    padding: 0;
    cursor: pointer;
    font: inherit;
    color: var(--text);
  }
  .toggle[disabled] { color: var(--muted); }
  .toggle:disabled { opacity: 0.5; cursor: not-allowed; }
  .toggle-track {
    position: relative;
    width: 30px;
    height: 16px;
    border-radius: 999px;
    background: var(--muted);
    transition: background 120ms ease;
    flex: 0 0 auto;
  }
  .toggle[data-state="enabled"] .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
    transition: transform 120ms ease;
  }
  .toggle[data-state="enabled"] .toggle-thumb { transform: translateX(14px); }
  .toggle-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    min-width: 22px;
  }
  .toggle[data-state="enabled"] .toggle-label { color: var(--accent); }
  .toggle:hover:not(:disabled) .toggle-thumb { box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.25); }

  .empty {
    color: var(--muted);
    font-style: italic;
    padding: 16px;
    text-align: center;
  }

  .row-actions { display: flex; gap: 6px; justify-content: flex-end; }
  button.remove {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--danger);
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  button.remove:hover { border-color: var(--danger); background: rgba(207, 34, 46, 0.08); }
  button.move {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  button.move:hover { border-color: var(--accent); color: var(--accent); }
  /* Per-member "Clear park" escape hatch (issue #147). Hidden by default; shown
     by applyLiveStatus() only when the member reports parked:true. */
  button.clear-park {
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--accent);
    border-radius: 4px;
    padding: 3px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  button.clear-park:hover { border-color: var(--accent); background: rgba(0, 0, 0, 0.04); }

  .addsub-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    padding: 12px 16px;
  }
  .addsub-card h2 { margin: 0 0 10px; font-size: 15px; font-family: var(--mono); }
  .addsub-hint { margin: 0 0 10px; font-size: 12px; color: var(--muted); }

  form.add-member {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  form.add-member input,
  form.add-member select {
    flex: 1 1 120px;
    min-width: 0;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
  }
  form.add-member input:focus,
  form.add-member select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  form.add-member button {
    flex: 0 0 auto;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: var(--accent-text);
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 12px;
  }
  form.add-member button:hover { filter: brightness(1.05); }

  footer.bottom {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    background: var(--panel);
  }
  footer.bottom p { margin: 0 0 6px; }
  footer.bottom p:last-child { margin-bottom: 0; }
</style>
</head>
<body>
<header class="top">
  <h1>Agent Quota Gateway</h1>
  <span class="meta">Pool Management</span>
</header>
<main>
  <div id="banner" role="alert"></div>
  <div id="addsub"></div>
  <div id="pools"></div>
</main>
<footer class="bottom">
  <p>Inherits the gateway&rsquo;s trust boundary. Default mode: loopback only.</p>
  <p>Shared mode: any tailnet member that can reach this port can read the pool layout and issue writes (reorder priority, disable members). The Tailscale ACL is the only gate.</p>
</footer>
<script>
(function () {
  'use strict';

  // Credential contract: ALLOWED_MEMBER_KEYS are the only member fields read
  // from /_gateway/config and rendered. A credential is write-only — the
  // add-subscription form sends it in the POST body and never reads it back,
  // stores it in the DOM, or echoes it anywhere. The static guard in
  // config_handlers_test.go enforces this: the deliberately-named credential
  // field is on a tight allowlist; any other secret/token/api-key shaped
  // string still fails the build.
  var ALLOWED_MEMBER_KEYS = ['nick', 'base_url', 'disabled', 'status'];

  var root = document.getElementById('pools');
  var banner = document.getElementById('banner');
  var POLL_MS = 3000;

  // currentViews holds the latest sanitized config views, so the move flow can
  // enumerate candidate target pools and inspect a target's type/membership
  // without re-fetching. Set on every renderAll().
  var currentViews = [];

  function showBanner(msg) {
    banner.textContent = msg;
    banner.classList.add('show');
    clearTimeout(showBanner._t);
    showBanner._t = setTimeout(function () {
      banner.classList.remove('show');
    }, 5000);
  }

  function escapeHTML(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function isBalanced(view) {
    return !!view.balance_mode && view.balance_mode.length > 0;
  }

  function sanitizeView(view) {
    // Defensive: drop any member field that is not on the allowlist.
    var members = (view.members || []).map(function (m) {
      var out = {};
      ALLOWED_MEMBER_KEYS.forEach(function (k) {
        if (m && Object.prototype.hasOwnProperty.call(m, k)) {
          out[k] = m[k];
        }
      });
      return out;
    });
    // window_labels is a pool-level hint (issue #138): Z.AI's long
    // window is monthly, others are 7d. Pass it through as-is when
    // present; UI consumers fall back to "5h"/"7d" when missing.
    var windowLabels = null;
    if (view.window_labels && typeof view.window_labels === 'object') {
      windowLabels = {
        short: String(view.window_labels.short || '5h'),
        long: String(view.window_labels.long || '7d'),
      };
    }
    return {
      pool: String(view.pool || ''),
      balance_mode: view.balance_mode || '',
      priority: Array.isArray(view.priority) ? view.priority.slice() : [],
      members: members,
      window_labels: windowLabels,
    };
  }

  function fetchJSON(url, opts) {
    return fetch(url, opts || {}).then(function (resp) {
      var ct = resp.headers.get('content-type') || '';
      var p = resp.text().then(function (text) {
        var body = text;
        if (ct.indexOf('application/json') !== -1) {
          try { body = JSON.parse(text); } catch (e) { body = null; }
        }
        return { status: resp.status, ok: resp.ok, body: body };
      });
      return p;
    });
  }

  function renderEmpty(msg) {
    root.innerHTML = '';
    var d = document.createElement('div');
    d.className = 'empty';
    d.textContent = msg;
    root.appendChild(d);
  }

  function renderSection(view) {
    var section = document.createElement('section');
    section.className = 'pool';
    section.setAttribute('data-pool', view.pool);

    var head = document.createElement('header');
    var h2 = document.createElement('h2');
    h2.textContent = view.pool;
    head.appendChild(h2);

    if (isBalanced(view)) {
      var badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = 'balanced — priority N/A';
      head.appendChild(badge);
    } else if (view.priority.length > 0) {
      var badge2 = document.createElement('span');
      badge2.className = 'badge';
      badge2.textContent = 'priority pool';
      head.appendChild(badge2);
    }

    var updated = document.createElement('span');
    updated.className = 'updated';
    updated.setAttribute('data-role', 'updated');
    updated.textContent = '';
    head.appendChild(updated);

    section.appendChild(head);

    var cols = document.createElement('div');
    cols.className = 'columns';

    var colPrio = document.createElement('div');
    colPrio.className = 'col';
    var h3p = document.createElement('h3');
    h3p.textContent = 'Priority order';
    colPrio.appendChild(h3p);

    if (isBalanced(view)) {
      var note = document.createElement('p');
      note.className = 'balanced-note';
      note.textContent = 'Balanced pools rotate automatically; manual priority is not applicable.';
      colPrio.appendChild(note);
    } else {
      colPrio.appendChild(renderPriority(view));
    }
    cols.appendChild(colPrio);

    var colMem = document.createElement('div');
    colMem.className = 'col';
    var h3m = document.createElement('h3');
    h3m.textContent = 'Members';
    colMem.appendChild(h3m);
    colMem.appendChild(renderMembers(view));
    cols.appendChild(colMem);

    section.appendChild(cols);
    return section;
  }

  function renderPriority(view) {
    var ol = document.createElement('ol');
    ol.className = 'priority';
    ol.setAttribute('data-role', 'priority');

    // When no priority is configured yet, seed the reorderable list from the
    // pool's members so the operator can establish an initial order; the first
    // reorder POSTs it to /priority and the pool becomes a priority pool. Only
    // do this for pools with >=2 members — a single-member (or empty) pool gets
    // no controls (nothing to order).
    var order = view.priority.length > 0
      ? view.priority
      : (view.members.length >= 2
          ? view.members.map(function (m) { return m.nick; })
          : []);

    order.forEach(function (nick, idx) {
      var li = document.createElement('li');
      li.setAttribute('data-nick', nick);
      var name = document.createElement('span');
      name.className = 'nick';
      name.textContent = nick;
      li.appendChild(name);

      var up = document.createElement('button');
      up.type = 'button';
      up.textContent = '↑';
      up.setAttribute('aria-label', 'Move ' + nick + ' up');
      up.disabled = idx === 0;
      up.addEventListener('click', function () {
        movePriority(view.pool, idx, idx - 1);
      });
      li.appendChild(up);

      var down = document.createElement('button');
      down.type = 'button';
      down.textContent = '↓';
      down.setAttribute('aria-label', 'Move ' + nick + ' down');
      down.disabled = idx === order.length - 1;
      down.addEventListener('click', function () {
        movePriority(view.pool, idx, idx + 1);
      });
      li.appendChild(down);

      ol.appendChild(li);
    });

    return ol;
  }

  function renderMembers(view) {
    var table = document.createElement('table');
    table.className = 'members';

    // Per-pool column labels (issue #138): the long-window column header
    // is provider-aware. Z.AI's long window is monthly, not 7-day, so
    // the column must say so. Default is the Anthropic-style "7d".
    var labels = (view && view.window_labels) ? view.window_labels : { short: '5h', long: '7d' };
    var longLabel = labels.long || '7d';
    var longResetLabel = longLabel + ' reset';

    var thead = document.createElement('thead');
    var trh = document.createElement('tr');
    ['Nick', 'Status', '5h', '5h reset', longLabel, longResetLabel, ''].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      trh.appendChild(th);
    });
    thead.appendChild(trh);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    view.members.forEach(function (m) {
      var tr = document.createElement('tr');
      tr.setAttribute('data-nick', m.nick);

      var tdN = document.createElement('td');
      tdN.className = 'nick';
      tdN.textContent = m.nick;
      tr.appendChild(tdN);

      var tdS = document.createElement('td');
      var status = document.createElement('span');
      status.className = 'status';
      status.setAttribute('data-status', m.status || 'idle');
      status.setAttribute('data-role', 'status');
      status.textContent = m.status || 'idle';
      tdS.appendChild(status);
      tr.appendChild(tdS);

      // Quota cells start as "-"; applyLiveStatus() fills them from
      // /_gateway/pool once a snapshot exists (config carries no snapshot).
      var td5h = document.createElement('td');
      td5h.className = 'quota';
      td5h.setAttribute('data-role', 'quota-5h');
      renderQuota(td5h, null);
      tr.appendChild(td5h);

      var td5hr = document.createElement('td');
      td5hr.className = 'reset';
      td5hr.setAttribute('data-role', 'reset-5h');
      td5hr.textContent = '-';
      tr.appendChild(td5hr);

      // The 5h / 5h-reset cells stay hard-coded; the long-window cells
      // keep the snapshot's unified_7d_* fields (right data shape) but
      // surface as "monthly" or whatever the pool's label says.
      var tdLong = document.createElement('td');
      tdLong.className = 'quota';
      tdLong.setAttribute('data-role', 'quota-long');
      renderQuota(tdLong, null);
      tr.appendChild(tdLong);

      var tdLongReset = document.createElement('td');
      tdLongReset.className = 'reset';
      tdLongReset.setAttribute('data-role', 'reset-long');
      tdLongReset.textContent = '-';
      tr.appendChild(tdLongReset);

      var tdA = document.createElement('td');
      var actions = document.createElement('div');
      actions.className = 'row-actions';

      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'toggle';
      btn.setAttribute('data-role', 'toggle');
      btn.setAttribute('data-state', m.disabled ? 'disabled' : 'enabled');
      btn.setAttribute('role', 'switch');
      btn.setAttribute('aria-checked', m.disabled ? 'false' : 'true');
      btn.setAttribute('aria-label', m.disabled ? 'Enable member' : 'Disable member');
      var track = document.createElement('span');
      track.className = 'toggle-track';
      track.setAttribute('aria-hidden', 'true');
      var thumb = document.createElement('span');
      thumb.className = 'toggle-thumb';
      thumb.setAttribute('aria-hidden', 'true');
      track.appendChild(thumb);
      btn.appendChild(track);
      var labelEl = document.createElement('span');
      labelEl.className = 'toggle-label';
      labelEl.textContent = m.disabled ? 'Off' : 'On';
      btn.appendChild(labelEl);
      btn.addEventListener('click', function () {
        toggleMember(view.pool, m.nick, !m.disabled);
      });
      actions.appendChild(btn);

      // "Clear park" — per-nick live-429 park override (issue #147). Created
      // hidden; applyLiveStatus() reveals it only when /_gateway/pool reports
      // this member parked:true (config carries no live park state).
      var clr = document.createElement('button');
      clr.type = 'button';
      clr.className = 'clear-park';
      clr.setAttribute('data-role', 'clear-park');
      clr.textContent = 'Clear park';
      clr.style.display = 'none';
      clr.addEventListener('click', function () {
        clearPark(view.pool, m.nick);
      });
      actions.appendChild(clr);

      var mv = document.createElement('button');
      mv.type = 'button';
      mv.className = 'move';
      mv.setAttribute('data-role', 'move');
      mv.textContent = 'Move';
      mv.addEventListener('click', function () {
        moveMember(view.pool, m.nick);
      });
      actions.appendChild(mv);

      var rm = document.createElement('button');
      rm.type = 'button';
      rm.className = 'remove';
      rm.setAttribute('data-role', 'remove');
      rm.textContent = 'Remove';
      rm.addEventListener('click', function () {
        removeMember(view.pool, m.nick);
      });
      actions.appendChild(rm);

      tdA.appendChild(actions);
      tr.appendChild(tdA);

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    // Wrap in a horizontally-scrollable container so the wide table degrades
    // to scroll (not clipping) when its grid cell is narrower than its
    // min-content width (narrow desktop / mobile). See .members-scroll.
    var scroll = document.createElement('div');
    scroll.className = 'members-scroll';
    scroll.appendChild(table);
    return scroll;
  }

  // renderQuota paints one rolling-window cell. utilization is a 0..1
  // fraction (null/undefined when the window has no data). Missing data
  // renders a muted "-"; present data renders a clamped progress bar with
  // a NN% label. Reset times live in their own columns (see formatReset).
  function renderQuota(cell, utilization) {
    cell.textContent = '';
    if (utilization == null || typeof utilization !== 'number' || isNaN(utilization)) {
      var dash = document.createElement('span');
      dash.className = 'quota-dash';
      dash.textContent = '-';
      cell.appendChild(dash);
      return;
    }
    var pct = Math.max(0, Math.min(100, utilization * 100));
    var label = Math.round(pct) + '%';

    var wrap = document.createElement('div');
    wrap.className = 'quota-bar';

    var track = document.createElement('div');
    track.className = 'quota-track';
    var fill = document.createElement('div');
    fill.className = 'quota-fill';
    fill.style.width = pct + '%';
    track.appendChild(fill);
    wrap.appendChild(track);

    var pctLabel = document.createElement('span');
    pctLabel.className = 'quota-pct';
    pctLabel.textContent = label;
    wrap.appendChild(pctLabel);

    cell.appendChild(wrap);
  }

  // formatReset renders an RFC3339 reset timestamp as a future-relative
  // duration against the client clock. kind selects the per-window format
  // (see issue #99). Returns "-" for missing, unparseable, or non-positive
  // (already-elapsed) values; the next poll refreshes it naturally.
  function formatReset(iso, kind) {
    if (!iso) return '-';
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '-';
    var ms = d.getTime() - Date.now();
    if (ms <= 0) return '-';
    var totalMin = Math.floor(ms / 60000);
    if (kind === '5h') {
      var h5 = Math.floor(totalMin / 60);
      var m5 = totalMin % 60;
      return h5 > 0 ? 'in ' + h5 + 'hr ' + m5 + 'min' : 'in ' + m5 + 'min';
    }
    // 7d window.
    var days = Math.floor(totalMin / 1440);
    var hrs = Math.floor((totalMin % 1440) / 60);
    var mins = totalMin % 60;
    return days > 0
      ? 'in ' + days + 'd ' + hrs + 'hr ' + mins + 'min'
      : 'in ' + hrs + 'hr ' + mins + 'min';
  }

  function mkInput(type, field, placeholder) {
    var el = document.createElement('input');
    el.type = type;
    el.setAttribute('data-field', field);
    el.placeholder = placeholder;
    el.autocomplete = 'off';
    return el;
  }

  // NEW_POOL is the sentinel pool-selector value that switches the form into
  // create-a-runtime-pool mode (wires POST /_gateway/pool, issue #148).
  var NEW_POOL = '__new__';

  // renderAddSubscription builds the single standalone Add-subscription form
  // (outside the pool boxes) into #addsub, rebuilt on each renderAll so the
  // target-pool dropdown stays in sync. It targets any existing pool, and its
  // "New pool…" selector option creates a runtime pool via POST /_gateway/pool
  // (#104/#148) and can add the first member in the same submit. It renders
  // even with zero pools so the first pool can be created from a fresh gateway.
  function renderAddSubscription(views) {
    var host = document.getElementById('addsub');
    if (!host) { return; }
    host.innerHTML = '';
    views = views || [];

    var section = document.createElement('section');
    section.className = 'addsub-card';

    var h2 = document.createElement('h2');
    h2.textContent = 'Add subscription';
    section.appendChild(h2);

    var hint = document.createElement('p');
    hint.className = 'addsub-hint';
    hint.textContent = 'Choose a target pool, or pick "New pool…" to create a ' +
      'runtime plain pool (name + base_url required) — a nick is optional there ' +
      'and, if given, is added as the pool’s first member.';
    section.appendChild(hint);

    var form = document.createElement('form');
    form.className = 'add-member';
    form.setAttribute('data-role', 'add-member');

    var nick = mkInput('text', 'nick', 'nick');
    var base = mkInput('text', 'base_url', 'base_url (optional)');
    var cred = mkInput('password', 'credential', 'credential (optional)');

    // New-pool fields, revealed only when NEW_POOL is selected.
    var poolName = mkInput('text', 'pool_name', 'new pool name');
    var poolBase = mkInput('text', 'pool_base_url', 'new pool base_url');

    var pool = document.createElement('select');
    pool.setAttribute('data-field', 'pool');
    views.forEach(function (v) {
      var opt = document.createElement('option');
      opt.value = v.pool;
      opt.textContent = v.pool;
      pool.appendChild(opt);
    });
    var newOpt = document.createElement('option');
    newOpt.value = NEW_POOL;
    newOpt.textContent = 'New pool…';
    pool.appendChild(newOpt);

    form.appendChild(nick);
    form.appendChild(base);
    form.appendChild(cred);
    form.appendChild(pool);
    form.appendChild(poolName);
    form.appendChild(poolBase);

    // toggleNewPool reveals/hides the new-pool fields and adjusts the nick
    // placeholder (nick is optional when creating a pool). Called on build and
    // on every selector change so the zero-pool case starts already revealed.
    function toggleNewPool() {
      var creating = pool.value === NEW_POOL;
      poolName.style.display = creating ? '' : 'none';
      poolBase.style.display = creating ? '' : 'none';
      nick.placeholder = creating ? 'nick (optional)' : 'nick';
    }
    pool.addEventListener('change', toggleNewPool);
    toggleNewPool();

    var submit = document.createElement('button');
    submit.type = 'submit';
    submit.textContent = 'Add subscription';
    form.appendChild(submit);

    form.addEventListener('submit', function (ev) {
      ev.preventDefault();
      addSubscription({
        nick: nick, base: base, cred: cred, pool: pool,
        poolName: poolName, poolBase: poolBase,
      });
    });

    section.appendChild(form);
    host.appendChild(section);
  }

  function loadConfig() {
    return fetchJSON('/_gateway/config').then(function (r) {
      if (!r.ok || !Array.isArray(r.body)) {
        showBanner('Failed to load /_gateway/config (status ' + r.status + ')');
        return [];
      }
      return r.body.map(sanitizeView);
    });
  }

  function loadStatus() {
    return fetchJSON('/_gateway/pool').then(function (r) {
      if (!r.ok || !Array.isArray(r.body)) return null;
      return r.body;
    });
  }

  function applyLiveStatus(statuses) {
    if (!statuses) return;
    var byPool = {};
    statuses.forEach(function (s) { byPool[s.pool] = s; });
    var sections = root.querySelectorAll('section.pool');
    var now = new Date();
    var hh = String(now.getHours()).padStart(2, '0');
    var mm = String(now.getMinutes()).padStart(2, '0');
    var ss = String(now.getSeconds()).padStart(2, '0');
    var stamp = 'updated ' + hh + ':' + mm + ':' + ss;

    sections.forEach(function (section) {
      var pool = section.getAttribute('data-pool');
      var s = byPool[pool];
      var upd = section.querySelector('[data-role="updated"]');
      if (upd) upd.textContent = stamp;
      if (!s) return;
      var rows = section.querySelectorAll('table.members tbody tr');
      rows.forEach(function (tr) {
        var nick = tr.getAttribute('data-nick');
        var match = null;
        s.members.forEach(function (m) { if (m.nick === nick) match = m; });
        if (!match) return;
        var badge = tr.querySelector('[data-role="status"]');
        if (badge) {
          badge.setAttribute('data-status', match.status || 'idle');
          badge.textContent = match.status || 'idle';
        }
        // The per-nick "Clear park" control surfaces only on a live-parked
        // member (issue #147). parked is the reliable live-429 gate from
        // /_gateway/pool, independent of the status string.
        var clr = tr.querySelector('[data-role="clear-park"]');
        if (clr) {
          clr.style.display = match.parked ? '' : 'none';
        }
        var snap = match.snapshot || null;
        var cell5h = tr.querySelector('[data-role="quota-5h"]');
        if (cell5h) {
          renderQuota(cell5h, snap ? snap.unified_5h_utilization : null);
        }
        var reset5h = tr.querySelector('[data-role="reset-5h"]');
        if (reset5h) {
          reset5h.textContent = formatReset(snap ? snap.unified_5h_reset : null, '5h');
        }
        var cellLong = tr.querySelector('[data-role="quota-long"]');
        if (cellLong) {
          renderQuota(cellLong, snap ? snap.unified_7d_utilization : null);
        }
        var resetLong = tr.querySelector('[data-role="reset-long"]');
        if (resetLong) {
          // The snapshot still uses unified_7d_* (right data shape for
          // any long window); only the human label is monthly for Z.AI.
          // formatReset('7d') returns the Xd/Yhr/Zmin branch, which is
          // what a monthly reset needs.
          resetLong.textContent = formatReset(snap ? snap.unified_7d_reset : null, '7d');
        }
      });
    });
  }

  function renderAll(views) {
    currentViews = views || [];
    renderAddSubscription(currentViews);
    if (!views.length) {
      renderEmpty('No pools configured.');
      return;
    }
    root.innerHTML = '';
    views.forEach(function (v) {
      root.appendChild(renderSection(v));
    });
  }

  function movePriority(pool, from, to) {
    var section = root.querySelector('section.pool[data-pool="' + cssEscape(pool) + '"]');
    if (!section) return;
    var items = section.querySelectorAll('ol.priority li');
    var order = [];
    items.forEach(function (li) { order.push(li.getAttribute('data-nick')); });
    if (from < 0 || to < 0 || from >= order.length || to >= order.length) return;
    var nick = order.splice(from, 1)[0];
    order.splice(to, 0, nick);
    postJSON('/_gateway/pool/' + encodeURIComponent(pool) + '/priority', order)
      .then(function (r) { return refreshAfter(r, 'Failed to reorder priority'); });
  }

  function toggleMember(pool, nick, disabled) {
    var verb = disabled ? 'disable' : 'enable';
    postJSON('/_gateway/pool/' + encodeURIComponent(pool) + '/member/' + encodeURIComponent(nick) + '/' + verb, null)
      .then(function (r) { return refreshAfter(r, 'Failed to ' + verb + ' member'); });
  }

  function clearPark(pool, nick) {
    // This overrides the gateway's own judgment that the member is parked, so
    // confirm. Real quota exhaustion re-parks via record429 on the next 429.
    var ok = window.confirm(
      'Clear the live-429 park on "' + nick + '" in pool "' + pool + '"?\n\n' +
      'This forces the member back into rotation now, overriding the gateway. ' +
      'If it is genuinely out of quota it will simply re-park on the next 429.');
    if (!ok) { return; }
    postJSON('/_gateway/clear?pool=' + encodeURIComponent(pool) + '&nick=' + encodeURIComponent(nick), null)
      .then(function (r) { return refreshAfter(r, 'Failed to clear park'); });
  }

  function addSubscription(fields) {
    var nick = (fields.nick.value || '').trim();
    var cred = fields.cred.value || '';
    var base = (fields.base.value || '').trim();
    var pool = fields.pool.value || '';

    // "New pool…" mode: create the runtime pool first, then (optionally) add the
    // first member into it. The pool is POSTed before any member, so a failed
    // create leaves nothing partial behind. mode is omitted — the backend fixes
    // it to "plain" (the only supported value).
    if (pool === NEW_POOL) {
      var pName = (fields.poolName.value || '').trim();
      var pBase = (fields.poolBase.value || '').trim();
      if (!pName) { showBanner('Create pool failed: pool name is required'); return; }
      if (!pBase) { showBanner('Create pool failed: pool base_url is required'); return; }
      postJSON('/_gateway/pool', { name: pName, base_url: pBase }).then(function (r) {
        if (!r || !r.ok) {
          // Surfaces 409 (duplicate name) / 400 (invalid input) via showBanner.
          return refreshAfter(r, 'Failed to create pool');
        }
        // Use the server-normalized pool name as the member target.
        var created = (r.body && r.body.pool) || pName;
        fields.poolName.value = '';
        fields.poolBase.value = '';
        if (!nick) {
          // Pool-only create: refresh so the new pool joins the list.
          return refreshAfter(r, 'Failed to create pool');
        }
        // Add the first member into the fresh plain pool. A brand-new plain pool
        // has no priority order, so no placement prompt is needed.
        var mBody = {};
        if (cred) { mBody['credential'] = cred; }
        if (base) { mBody.base_url = base; }
        return postJSON('/_gateway/pool/' + encodeURIComponent(created) +
          '/member/' + encodeURIComponent(nick), mBody).then(function (r2) {
          if (r2 && r2.ok) {
            fields.nick.value = '';
            fields.base.value = '';
            fields.cred.value = '';
          }
          return refreshAfter(r2, 'Pool created but failed to add member');
        });
      });
      return;
    }

    // nick and a target pool are always required. The other two fields are
    // optional — the backend resolves them for a known subscription and returns
    // a clear 400 when it cannot.
    if (!nick) { showBanner('Add failed: nick is required'); return; }
    if (!pool) { showBanner('Add failed: target pool is required'); return; }

    var target = null;
    currentViews.forEach(function (v) { if (v.pool === pool) target = v; });
    if (!target) { showBanner('Add failed: unknown target pool "' + pool + '"'); return; }

    var body = {};
    if (cred) { body['credential'] = cred; }
    if (base) { body.base_url = base; }

    // A priority target needs an explicit placement that includes this nick;
    // there is no implicit insertion. Plain/balanced targets carry none.
    var isPriorityTarget = !isBalanced(target) && target.priority.length > 0;
    if (isPriorityTarget) {
      var suggestion = target.priority.slice().concat([nick]).join(', ');
      var placementStr = window.prompt(
        'Pool "' + pool + '" is a priority pool. Enter the full priority order ' +
        '(comma-separated, highest first). It must include "' + nick + '":',
        suggestion);
      if (placementStr == null) { return; }
      var placement = placementStr.split(',')
        .map(function (s) { return s.trim(); })
        .filter(function (s) { return s.length > 0; });
      if (placement.indexOf(nick) === -1) {
        showBanner('Add failed: placement must include "' + nick + '"');
        return;
      }
      body.placement = placement;
    }

    postJSON('/_gateway/pool/' + encodeURIComponent(pool) + '/member/' + encodeURIComponent(nick), body)
      .then(function (r) {
        // Clear inputs on success so the value never lingers in the DOM.
        if (r && r.ok) {
          fields.nick.value = '';
          fields.base.value = '';
          fields.cred.value = '';
        }
        return refreshAfter(r, 'Failed to add subscription');
      });
  }

  function removeMember(pool, nick) {
    var ok = window.confirm(
      'Remove subscription "' + nick + '" from pool "' + pool + '"?\n\n' +
      'This is permanent and cannot be undone.');
    if (!ok) { return; }
    fetchJSON('/_gateway/pool/' + encodeURIComponent(pool) + '/member/' + encodeURIComponent(nick),
      { method: 'DELETE', headers: { 'Accept': 'application/json' } })
      .then(function (r) { return refreshAfter(r, 'Failed to remove subscription'); });
  }

  function moveMember(fromPool, nick) {
    var targets = currentViews
      .map(function (v) { return v.pool; })
      .filter(function (p) { return p !== fromPool; });
    if (!targets.length) {
      showBanner('Move failed: no other pool to move into');
      return;
    }
    var to = window.prompt(
      'Move subscription "' + nick + '" from "' + fromPool + '" to which pool?\n\n' +
      'Available: ' + targets.join(', '), targets[0]);
    if (to == null) { return; }
    to = to.trim();
    if (!to) { return; }

    var target = null;
    currentViews.forEach(function (v) { if (v.pool === to) target = v; });
    if (!target) {
      showBanner('Move failed: unknown target pool "' + to + '"');
      return;
    }

    var body = { to: to };

    // A priority target with no existing slot for this nick needs explicit
    // placement; there is no implicit insertion. Plain/balanced targets, and
    // overwriting an existing same-nick slot, need none.
    var isPriorityTarget = !isBalanced(target) && target.priority.length > 0;
    var existingSlot = false;
    target.members.forEach(function (m) { if (m.nick === nick) existingSlot = true; });
    if (isPriorityTarget && !existingSlot) {
      var suggestion = target.priority.slice().concat([nick]).join(', ');
      var placementStr = window.prompt(
        'Target "' + to + '" is a priority pool. Enter the full priority order ' +
        '(comma-separated, highest first). It must include "' + nick + '":',
        suggestion);
      if (placementStr == null) { return; }
      var placement = placementStr.split(',')
        .map(function (s) { return s.trim(); })
        .filter(function (s) { return s.length > 0; });
      if (placement.indexOf(nick) === -1) {
        showBanner('Move failed: placement must include "' + nick + '"');
        return;
      }
      body.placement = placement;
    }

    postMove(fromPool, nick, body, false);
  }

  function postMove(fromPool, nick, body, isRetry) {
    var url = '/_gateway/pool/' + encodeURIComponent(fromPool) +
      '/member/' + encodeURIComponent(nick) + '/move';
    return postJSON(url, body).then(function (r) {
      if (r && r.status === 409 && !isRetry) {
        var ok = window.confirm(
          'Target already has "' + nick + '" configured differently (key or base_url).\n\n' +
          'Overwrite the target member?');
        if (!ok) { return loadConfig().then(renderAll); }
        var forced = {};
        Object.keys(body).forEach(function (k) { forced[k] = body[k]; });
        forced.force = true;
        return postMove(fromPool, nick, forced, true);
      }
      return refreshAfter(r, 'Failed to move subscription');
    });
  }

  function postJSON(url, body) {
    var opts = { method: 'POST', headers: { 'Accept': 'application/json' } };
    if (body !== null && body !== undefined) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    return fetchJSON(url, opts);
  }

  function refreshAfter(resp, msg) {
    if (resp && resp.ok) {
      return loadConfig().then(renderAll).then(loadStatus).then(applyLiveStatus);
    }
    var err = (resp && resp.body && resp.body.error) || (resp ? ('status ' + resp.status) : 'network error');
    showBanner(msg + ': ' + err);
    // Re-fetch to reconcile UI with server state after a failed write.
    return loadConfig().then(renderAll);
  }

  function cssEscape(s) {
    if (window.CSS && window.CSS.escape) return window.CSS.escape(s);
    return String(s).replace(/[^a-zA-Z0-9_-]/g, function (c) { return '\\' + c; });
  }

  function tick() {
    loadStatus().then(applyLiveStatus).then(function () {
      setTimeout(tick, POLL_MS);
    }).catch(function (e) {
      console.error('status poll failed', e);
      setTimeout(tick, POLL_MS);
    });
  }

  function boot() {
    loadConfig()
      .then(renderAll)
      .then(loadStatus)
      .then(applyLiveStatus)
      .then(tick)
      .catch(function (e) {
        console.error('boot failed', e);
        renderEmpty('Failed to reach the gateway. ' + (e && e.message ? e.message : ''));
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
